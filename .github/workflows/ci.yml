name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Format check
        run: pnpm run format:check
      - name: Lint backend
        run: pnpm run lint:backend
      - name: Typecheck backend
        run: pnpm run typecheck:backend
      - name: Test backend
        run: pnpm run test:backend

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter pub get
        working-directory: mobile/app
        run: flutter pub get
      - name: Flutter analyze
        working-directory: mobile/app
        run: flutter analyze
      - name: Flutter test
        working-directory: mobile/app
        run: flutter test

  parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install parser dependencies
        working-directory: tools/pdf_parser
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        working-directory: tools/pdf_parser
        run: ruff check .
      - name: Pytest
        working-directory: tools/pdf_parser
        run: pytest
