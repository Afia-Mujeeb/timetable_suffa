openapi: 3.1.0
info:
  title: Timetable Worker Admin API
  version: 0.6.0
  description: |
    Sprint 6 admin contract for operator-driven import, preview, publish, rollback, and audit workflows.
    `/v1/*` routes require the `x-import-secret` header when the runtime is configured with
    `IMPORT_SHARED_SECRET`.
servers:
  - url: https://admin.example.com
tags:
  - name: Operations
  - name: Imports
  - name: Versions
  - name: Audit
paths:
  /health:
    get:
      tags: [Operations]
      operationId: getAdminHealth
      summary: Report worker liveness.
      responses:
        "200":
          description: The admin worker process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags: [Operations]
      operationId: getAdminReadiness
      summary: Report whether the admin worker can perform admin operations.
      responses:
        "200":
          description: The admin worker is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/imports:
    post:
      tags: [Imports]
      operationId: createTimetableImport
      summary: Import a parser artifact as a draft timetable version.
      description: |
        Accepts either the raw parser artifact JSON body or a wrapper JSON object with
        `artifact`, `sourceId`, `parserVersion`, `triggeredBy`, and `note`.
      security:
        - ImportSecretHeader: []
      parameters:
        - $ref: "#/components/parameters/OperatorIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ParserArtifact"
                - $ref: "#/components/schemas/ImportEnvelopeRequest"
      responses:
        "201":
          description: The artifact was accepted and stored as a draft version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"
        "400":
          description: The import request was invalid, unauthorized, or otherwise rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The import failed unexpectedly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/versions:
    get:
      tags: [Versions]
      operationId: listTimetableVersions
      summary: List known timetable versions.
      security:
        - ImportSecretHeader: []
      responses:
        "200":
          description: Version history was returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVersionsResponse"
        "400":
          description: The request was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/versions/{versionId}/preview:
    get:
      tags: [Versions]
      operationId: previewTimetableVersion
      summary: Inspect a version before publish.
      security:
        - ImportSecretHeader: []
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version preview information was returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionPreviewResponse"
        "400":
          description: The request was invalid or unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The requested version was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/versions/{versionId}/publish:
    post:
      tags: [Versions]
      operationId: publishTimetableVersion
      summary: Promote a version to the current published timetable.
      security:
        - ImportSecretHeader: []
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/OperatorIdHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionActionRequest"
      responses:
        "200":
          description: The requested version is now published.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionActionResponse"
        "400":
          description: The publish request was invalid or unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The requested version was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The publish request conflicted with version state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: The target version was not publishable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The publish operation failed unexpectedly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/versions/{versionId}/rollback:
    post:
      tags: [Versions]
      operationId: rollbackTimetableVersion
      summary: Re-point the published timetable to a previous version.
      security:
        - ImportSecretHeader: []
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/OperatorIdHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionActionRequest"
      responses:
        "200":
          description: The rollback completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionActionResponse"
        "400":
          description: The rollback request was invalid or unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The requested version was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The rollback request conflicted with version state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: The rollback target was not publishable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The rollback operation failed unexpectedly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/import-runs:
    get:
      tags: [Audit]
      operationId: listImportRuns
      summary: List import execution records.
      security:
        - ImportSecretHeader: []
      responses:
        "200":
          description: Import history was returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListImportRunsResponse"
        "400":
          description: The request was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/audit-events:
    get:
      tags: [Audit]
      operationId: listAuditEvents
      summary: List publish and rollback audit events.
      security:
        - ImportSecretHeader: []
      responses:
        "200":
          description: Audit history was returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAuditEventsResponse"
        "400":
          description: The request was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    ImportSecretHeader:
      type: apiKey
      in: header
      name: x-import-secret
      description: Required for `/v1/*` only when the runtime is configured with `IMPORT_SHARED_SECRET`.
  parameters:
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stable server-generated timetable version identifier.
    OperatorIdHeader:
      name: x-operator-id
      in: header
      required: false
      schema:
        type: string
      description: Optional operator identity used when the body omits `triggeredBy`.
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - service
        - status
        - environment
      properties:
        requestId:
          type: string
        service:
          type: string
        status:
          type: string
          enum: [ok]
        environment:
          type: string
    ReadinessResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - service
        - status
        - environment
      properties:
        requestId:
          type: string
        service:
          type: string
        status:
          type: string
          enum: [ready]
        environment:
          type: string
    ParserArtifact:
      type: object
      additionalProperties: true
      description: Raw parser artifact JSON accepted directly by `POST /v1/imports`.
    ImportEnvelopeRequest:
      type: object
      additionalProperties: false
      required:
        - artifact
      properties:
        artifact:
          $ref: "#/components/schemas/ParserArtifact"
        sourceId:
          type:
            - string
            - "null"
        parserVersion:
          type:
            - string
            - "null"
        triggeredBy:
          type:
            - string
            - "null"
        note:
          type:
            - string
            - "null"
    VersionActionRequest:
      type: object
      additionalProperties: false
      properties:
        triggeredBy:
          type:
            - string
            - "null"
        note:
          type:
            - string
            - "null"
        ignoreWarnings:
          type: boolean
          default: false
    ImportResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - import
        - importRun
        - version
      properties:
        requestId:
          type: string
        import:
          $ref: "#/components/schemas/ImportSummary"
        importRun:
          $ref: "#/components/schemas/ImportRun"
        version:
          $ref: "#/components/schemas/VersionRecord"
    ListVersionsResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - versions
      properties:
        requestId:
          type: string
        versions:
          type: array
          items:
            $ref: "#/components/schemas/VersionRecord"
    VersionPreviewResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - version
        - currentVersion
        - importRun
        - warnings
        - sections
        - changes
        - pushPreview
        - publishable
      properties:
        requestId:
          type: string
        version:
          $ref: "#/components/schemas/VersionRecord"
        currentVersion:
          oneOf:
            - $ref: "#/components/schemas/VersionRecord"
            - type: "null"
        importRun:
          oneOf:
            - $ref: "#/components/schemas/ImportRun"
            - type: "null"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/FlexibleObject"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/FlexibleObject"
        changes:
          $ref: "#/components/schemas/ChangeSet"
        pushPreview:
          $ref: "#/components/schemas/PushPreview"
        publishable:
          type: boolean
    VersionActionResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - version
        - previousVersion
        - changes
        - pushPreview
        - auditEvent
      properties:
        requestId:
          type: string
        version:
          $ref: "#/components/schemas/VersionRecord"
        previousVersion:
          oneOf:
            - $ref: "#/components/schemas/VersionRecord"
            - type: "null"
        changes:
          $ref: "#/components/schemas/ChangeSet"
        pushPreview:
          $ref: "#/components/schemas/PushPreview"
        auditEvent:
          $ref: "#/components/schemas/AuditEvent"
    ListImportRunsResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - importRuns
      properties:
        requestId:
          type: string
        importRuns:
          type: array
          items:
            $ref: "#/components/schemas/ImportRun"
    ListAuditEventsResponse:
      type: object
      additionalProperties: false
      required:
        - requestId
        - auditEvents
      properties:
        requestId:
          type: string
        auditEvents:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    ImportSummary:
      type: object
      additionalProperties: false
      required:
        - sectionsImported
        - meetingsImported
        - warningsCount
      properties:
        sectionsImported:
          type: integer
          minimum: 0
        meetingsImported:
          type: integer
          minimum: 0
        warningsCount:
          type: integer
          minimum: 0
    VersionRecord:
      type: object
      additionalProperties: true
      description: Timetable version record returned by the admin service.
      properties:
        versionId:
          type: string
        publishStatus:
          type: string
        publishedAt:
          type:
            - string
            - "null"
          format: date-time
    ImportRun:
      type: object
      additionalProperties: true
      description: Import run record returned by the admin service.
      properties:
        importRunId:
          type: string
        triggeredBy:
          type:
            - string
            - "null"
    AuditEvent:
      type: object
      additionalProperties: true
      description: Publish or rollback audit event returned by the admin service.
      properties:
        auditEventId:
          type: string
        triggeredBy:
          type:
            - string
            - "null"
    ChangeSet:
      type: object
      additionalProperties: true
      properties:
        summary:
          $ref: "#/components/schemas/ChangeSummary"
    ChangeSummary:
      type: object
      additionalProperties: true
      properties:
        sectionsChanged:
          type: integer
          minimum: 0
        totalChanges:
          type: integer
          minimum: 0
    PushPreview:
      type: object
      additionalProperties: true
      properties:
        wouldNotify:
          type: boolean
        sections:
          type: array
          items:
            $ref: "#/components/schemas/FlexibleObject"
    FlexibleObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
