openapi: 3.1.0
info:
  title: Timetable Worker Admin API
  version: 0.2.0
  description: |
    Sprint 2 admin contract for importing canonical timetable JSON and publishing a draft version.
    If import execution becomes asynchronous later, keep the response envelope stable and switch the
    import success status from `201` to `202` rather than reshaping the payload.
servers:
  - url: https://admin.example.com
tags:
  - name: Operations
  - name: Imports
  - name: Publishing
paths:
  /health:
    get:
      tags: [Operations]
      operationId: getAdminHealth
      summary: Report worker liveness.
      responses:
        "200":
          description: The admin worker process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags: [Operations]
      operationId: getAdminReadiness
      summary: Report whether the admin worker can perform import and publish operations.
      responses:
        "200":
          description: The admin worker is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/imports:
    post:
      tags: [Imports]
      operationId: createTimetableImport
      summary: Import one canonical timetable payload as a draft version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportTimetableRequest"
      responses:
        "201":
          description: The canonical payload was accepted and stored as a draft version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTimetableResponse"
        "409":
          description: The import conflicts with an existing checksum or version identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: The canonical payload failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The import failed unexpectedly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/versions/{versionId}/publish:
    post:
      tags: [Publishing]
      operationId: publishTimetableVersion
      summary: Promote a draft timetable version to the current published version.
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishVersionRequest"
      responses:
        "200":
          description: The requested version is now the current published version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishVersionResponse"
        "404":
          description: The requested version does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The publish request conflicts with current version state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: The target version is not publishable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The publish operation failed unexpectedly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stable server-generated identifier for a timetable version.
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: "#/components/schemas/ServiceHealth"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ReadinessResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: "#/components/schemas/ServiceReadiness"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ImportTimetableRequest:
      type: object
      additionalProperties: false
      required:
        - source
        - versionLabel
        - sourceDate
        - sections
      properties:
        source:
          $ref: "#/components/schemas/ImportSource"
        versionLabel:
          type: string
          minLength: 1
          description: Human-readable label for the imported timetable version.
        sourceDate:
          type: string
          format: date
        checksum:
          type:
            - string
            - "null"
          description: Optional checksum of the canonical JSON artifact or original PDF.
        parserVersion:
          type:
            - string
            - "null"
        parserWarnings:
          type: array
          items:
            $ref: "#/components/schemas/ImportWarning"
        sections:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ImportedSection"
    ImportTimetableResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - importId
            - version
            - summary
            - warnings
          properties:
            importId:
              type: string
            version:
              $ref: "#/components/schemas/VersionSummary"
            summary:
              $ref: "#/components/schemas/ImportSummary"
            warnings:
              type: array
              items:
                $ref: "#/components/schemas/ImportWarning"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    PublishVersionRequest:
      type: object
      additionalProperties: false
      properties:
        expectedCurrentVersionId:
          type:
            - string
            - "null"
          description: Optional optimistic concurrency guard for safe publish workflows.
        note:
          type:
            - string
            - "null"
          maxLength: 500
    PublishVersionResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - version
          properties:
            version:
              $ref: "#/components/schemas/VersionSummary"
            previousVersion:
              oneOf:
                - $ref: "#/components/schemas/VersionSummary"
                - type: "null"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      additionalProperties: false
      required:
        - requestId
        - generatedAt
      properties:
        requestId:
          type: string
          description: Correlation identifier emitted in logs and error paths.
        generatedAt:
          type: string
          format: date-time
    ServiceHealth:
      type: object
      additionalProperties: false
      required:
        - service
        - status
        - environment
      properties:
        service:
          type: string
        status:
          type: string
          enum: [ok]
        environment:
          type: string
    ServiceReadiness:
      type: object
      additionalProperties: false
      required:
        - service
        - status
        - environment
        - checks
      properties:
        service:
          type: string
        status:
          type: string
          enum: [ready, degraded]
        environment:
          type: string
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DependencyCheck"
    DependencyCheck:
      type: object
      additionalProperties: false
      required:
        - name
        - status
      properties:
        name:
          type: string
          enum: [d1, parser-artifact, audit-log]
        status:
          type: string
          enum: [ok, unavailable]
        detail:
          type: string
    VersionSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - sourceDate
        - importedAt
        - status
        - isCurrent
        - sectionCount
        - meetingCount
      properties:
        id:
          type: string
        label:
          type: string
        sourceDate:
          type: string
          format: date
        importedAt:
          type: string
          format: date-time
        publishedAt:
          type:
            - string
            - "null"
          format: date-time
        status:
          type: string
          enum: [draft, published, archived]
        isCurrent:
          type: boolean
        checksum:
          type:
            - string
            - "null"
        sectionCount:
          type: integer
          minimum: 0
        meetingCount:
          type: integer
          minimum: 0
    ImportSource:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          type: string
          enum: [parser-json]
        fileName:
          type:
            - string
            - "null"
        artifactUrl:
          type:
            - string
            - "null"
          format: uri
        generatedAt:
          type:
            - string
            - "null"
          format: date-time
    ImportedSection:
      type: object
      additionalProperties: false
      required:
        - code
        - displayName
        - meetings
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 32
        displayName:
          type: string
          minLength: 1
        meetings:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ImportedMeeting"
    ImportedMeeting:
      type: object
      additionalProperties: false
      required:
        - courseName
        - dayOfWeek
        - startTime
        - endTime
        - isOnline
        - sourcePage
      properties:
        courseCode:
          type:
            - string
            - "null"
        courseName:
          type: string
          minLength: 1
        instructorName:
          type:
            - string
            - "null"
        roomLabel:
          type:
            - string
            - "null"
        isOnline:
          type: boolean
        dayOfWeek:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
        startTime:
          type: string
          pattern: "^[0-2][0-9]:[0-5][0-9]$"
        endTime:
          type: string
          pattern: "^[0-2][0-9]:[0-5][0-9]$"
        meetingType:
          type:
            - string
            - "null"
        sourcePage:
          type: integer
          minimum: 1
        confidence:
          type:
            - string
            - "null"
          enum: [high, medium, low, null]
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ImportWarning"
    ImportSummary:
      type: object
      additionalProperties: false
      required:
        - sectionCount
        - meetingCount
        - warningCount
      properties:
        sectionCount:
          type: integer
          minimum: 0
        meetingCount:
          type: integer
          minimum: 0
        warningCount:
          type: integer
          minimum: 0
    ImportWarning:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - parser_low_confidence
            - inferred_duration
            - inferred_room
            - inferred_instructor
            - duplicate_meeting
        message:
          type: string
        sectionCode:
          type:
            - string
            - "null"
        sourcePage:
          type:
            - integer
            - "null"
          minimum: 1
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - meta
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - validation_error
            - not_found
            - import_conflict
            - dependency_unavailable
            - internal_error
        message:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
        - issue
      properties:
        field:
          type: string
        resource:
          type: string
        issue:
          type: string
