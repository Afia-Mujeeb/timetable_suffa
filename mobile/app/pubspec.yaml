name: timetable_app
description: Flutter shell for the timetable rewrite.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^2.5.1
  flutter_timezone: ^5.0.2
  go_router: ^14.2.7
  http: ^1.2.2
  shared_preferences: ^2.2.3
  timezone: ^0.11.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
